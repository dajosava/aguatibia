# Configuración de build para Netlify (Vite + React)
# Documentación: docs/DESPLIEGUE-NETLIFY.md

[build]
  command = "npm run build"
  publish = "dist"

# Vite sustituye import.meta.env.VITE_* en el bundle JS; el escáner de secretos de Netlify
# puede marcar la clave anon (JWT) dentro de dist/ como hallazgo. Es un falso positivo:
# la clave anon está pensada para el cliente. Estos nombres son solo exclusiones del escaneo,
# no valores. Las variables reales siguen definiéndose en Netlify → Environment variables.
# Ver: https://ntl.fyi/configure-secrets-scanning
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"

# SPA: todas las rutas sirven index.html (útil si añades React Router más adelante)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
